<!DOCTYPE html>
<html>
<head>
<title>Smart Canteen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#0d6efd;
color:white;
padding:15px;
}

.logo{
width:90px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#28a745;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:8px;
margin-top:10px;
}

button:hover{
background:#218838;
}

.token{
font-size:28px;
color:#ff5722;
font-weight:bold;
}

.creator{
margin-top:20px;
font-size:12px;
color:gray;
}

.closed{
color:red;
font-weight:bold;
font-size:20px;
}

</style>

</head>

<body>

<div class="header">

<img src="YOUR_LOGO_URL" class="logo">

<h2>Smart Canteen</h2>

</div>

<div class="container">

<div id="closedMessage"></div>

<div class="card">

<h3>Select Item</h3>

<select id="item" style="width:100%;padding:10px;">
<option value="Tea">Tea ₹10</option>
<option value="Coffee">Coffee ₹15</option>
<option value="Breakfast">Breakfast ₹40</option>
<option value="Lunch">Lunch ₹60</option>
</select>

</div>

<div class="card">

<h3>Quantity</h3>

<input type="number" id="qty" value="1" style="width:100%;padding:10px;">

</div>

<button onclick="placeOrder()">Place Order</button>

<div class="card" id="tokenBox" style="display:none;">

<h3>Your Token Number</h3>

<div class="token" id="token"></div>

<p>Please complete payment</p>

</div>

<div class="creator">

Created by Kishor N

</div>

</div>

<script>

var scriptURL = "https://script.google.com/macros/s/AKfycbzV-WobKLjcYbEWekOD8_Pj4eo7evnlLI-HEpVmCbnbcx4Ik5KHncROVPEa75-rnw16/exec";

function checkClosingTime(){

var now = new Date();

var closing = new Date();

closing.setHours(10);
closing.setMinutes(30);

if(now > closing){

document.getElementById("closedMessage").innerHTML =
"<div class='closed'>Canteen Closed</div>";

}

}

checkClosingTime();


function placeOrder(){

var item = document.getElementById("item").value;
var qty = document.getElementById("qty").value;

var price = 0;

if(item=="Tea") price=10;
if(item=="Coffee") price=15;
if(item=="Breakfast") price=40;
if(item=="Lunch") price=60;

var total = price * qty;

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
item:item,
qty:qty,
total:total
})
})
.then(res=>res.json())
.then(data=>{

document.getElementById("tokenBox").style.display="block";

document.getElementById("token").innerHTML=data.token;

openUPI(total);

});

}

function openUPI(amount){

var upi="upi://pay?pa=yourupi@bank&pn=Canteen&am="+amount+"&cu=INR";

window.location.href = upi;

}

</script>

</body>
</html>
