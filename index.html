<!DOCTYPE html>
<html>
<head>
<title>VIMUL Smart Canteen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:18px;
background:#28a745;
color:white;
}

button:hover{
background:#1e7e34;
}

.token{
font-size:28px;
color:red;
margin-top:20px;
}

.footer{
margin-top:40px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<h2>VIMUL<br>Smart Canteen</h2>

<div class="box">

<h3>Order Menu</h3>

<label>Employee Meal ₹30</label>
<input type="number" id="meal" value="0"><br><br>

<label>Tea ₹5</label>
<input type="number" id="tea" value="0"><br><br>

<label>Other Meal ₹35</label>
<input type="number" id="other" value="0"><br><br>

<button onclick="placeOrder()">Place Order</button>

<div class="token" id="token"></div>

</div>

<div class="footer">
Created by Kishor N
</div>

<script>

function placeOrder(){

var now = new Date();
var hours = now.getHours();
var minutes = now.getMinutes();

if(hours>23 || (hours==23 && minutes>30))
{
alert("Ordering closed after 11:30 PM");
return;
}

var meal = document.getElementById("meal").value;
var tea = document.getElementById("tea").value;
var other = document.getElementById("other").value;

var total = meal*30 + tea*5 + other*35;

var token = Math.floor(Math.random()*900)+100;

document.getElementById("token").innerHTML = "Your Token : "+token;

var upi = "upi://pay?pa=9844927264@ybl&pn=Canteen&am="+total+"&cu=INR";

window.location.href = upi;

fetch("https://script.google.com/macros/s/AKfycbyiVlNRTHJDEvfSSdzJbYbxUBmk0rlyHLAi1ouUMcROWlps--lbEVk01HPXyaaK8QiSxw/exec",{

method:"POST",

body:JSON.stringify({

token:token,
meal:meal,
tea:tea,
other:other,
total:total

})

});

}

</script>

</body>
</html>
