<!DOCTYPE html>
<html>
<head>

<title>VIMUL Smart Canteen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1f4037,#99f2c8);
margin:0;
padding:10px;
text-align:center;
}

/* MOBILE CONTAINER */

.container{
background:white;
padding:20px;
border-radius:15px;
max-width:420px;
width:95%;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
font-size:22px;
margin-bottom:10px;
}

.menu-item{
margin:15px 0;
padding:15px;
border-radius:10px;
background:#f9f9f9;
}

.menu-item label{
font-size:18px;
font-weight:bold;
display:block;
margin-bottom:5px;
}

input{
width:80px;
padding:10px;
font-size:18px;
border-radius:5px;
border:1px solid #ccc;
text-align:center;
}

/* BIG MOBILE BUTTON */

button{
width:100%;
padding:16px;
margin-top:15px;
font-size:20px;
border:none;
border-radius:10px;
background:#28a745;
color:white;
cursor:pointer;
}

button:disabled{
background:gray;
}

/* TOKEN */

.token{
margin-top:20px;
font-size:26px;
font-weight:bold;
color:#e74c3c;
}

#qrcode{
margin-top:20px;
}

.footer{
margin-top:25px;
font-size:14px;
color:#333;
}

</style>

</head>

<body>

<div class="container">

<h2>VIMUL <br>Smart Canteen</h2>

<p id="status"></p>

<div class="menu-item">
<label>Employee Meal ₹30</label>
<input type="number" id="meal" value="0" min="0">
</div>

<div class="menu-item">
<label>Tea ₹5</label>
<input type="number" id="tea" value="0" min="0">
</div>

<div class="menu-item">
<label>Other Meal ₹35</label>
<input type="number" id="other" value="0" min="0">
</div>

<button id="orderBtn" onclick="placeOrder()">Place Order</button>

<div class="token" id="token"></div>

<div id="qrcode"></div>

</div>

<div class="footer">
Created by Kishor N
</div>

<script>

/* AUTO CLOSE AFTER 10:30 AM */

function checkTime(){

let now = new Date();
let hour = now.getHours();
let minute = now.getMinutes();

if(hour > 1 || (hour == 13 && minute >= 00)){

document.getElementById("status").innerHTML =
"<b style='color:red'>Orders Closed After 1:30 PM</b>";

document.getElementById("orderBtn").disabled = true;

}

}

checkTime();


function placeOrder(){

let meal = Number(document.getElementById("meal").value);
let tea = Number(document.getElementById("tea").value);
let other = Number(document.getElementById("other").value);

let total = meal*30 + tea*5 + other*35;

if(total == 0){
alert("Please select at least one item");
return;
}

/* TOKEN */

let token = "T" + Math.floor(1000 + Math.random()*9000);

document.getElementById("token").innerHTML =
"Token: " + token + "<br>Total: ₹" + total;

/* QR PAYMENT */

let upiID = "yourupi@bank";

let upiLink =
"upi://pay?pa="+upiID+
"&pn=SmartCanteen"+
"&am="+total+
"&cu=INR"+
"&tn=Token-"+token;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:upiLink,
width:200,
height:200
});

}

</script>

</body>
</html>
