<!DOCTYPE html>
<html>
<head>
<title>VIMUL Smart Canteen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
}

input{
width:70px;
padding:8px;
font-size:16px;
text-align:center;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;
background:#28a745;
color:white;
}

button:hover{
background:#1e7e34;
}

.token{
font-size:26px;
color:red;
margin-top:15px;
font-weight:bold;
}

.qr{
display:none;
margin-top:20px;
}

.footer{
margin-top:40px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<h2>VIMUL<br>Smart Canteen</h2>

<div class="box">

<h3>Order Menu</h3>

<p>Employee Meal ₹30</p>
<input type="number" id="meal" value="0" min="0">

<p>Tea ₹5</p>
<input type="number" id="tea" value="0" min="0">

<p>Other Meal ₹35</p>
<input type="number" id="other" value="0" min="0">

<button onclick="placeOrder()">Place Order</button>

<div class="token" id="token"></div>

<div class="qr" id="qrbox">

<h3>Scan & Pay</h3>

<img src="YOUR_UPI_QR_IMAGE_LINK" width="220">

<p>Scan QR using Google Pay / PhonePe / Paytm</p>

</div>

</div>

<div class="footer">
Created by Kishor N
</div>

<script>

function placeOrder(){

var meal = Number(document.getElementById("meal").value);
var tea = Number(document.getElementById("tea").value);
var other = Number(document.getElementById("other").value);

var total = meal*30 + tea*5 + other*35;

if(total==0){
alert("Please select items");
return;
}

/* TOKEN NUMBER */

var token = "T"+Date.now().toString().slice(-4);

document.getElementById("token").innerHTML =
"Token Number : "+token+"<br>Total ₹"+total;

/* SHOW QR CODE */

document.getElementById("qrbox").style.display="block";

/* SEND ORDER TO GOOGLE SHEETS */

fetch("https://script.google.com/macros/s/AKfycbyiVlNRTHJDEvfSSdzJbYbxUBmk0rlyHLAi1ouUMcROWlps--lbEVk01HPXyaaK8QiSxw/exec",{

method:"POST",

body:JSON.stringify({

token:token,
meal:meal,
tea:tea,
other:other,
total:total

})

});

}

</script>

</body>
</html>
